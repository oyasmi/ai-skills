name: AgentMux Test

on:
  push:
    paths:
      - "tools/agentmux/**"
      - ".github/workflows/agentmux-*.yml"
  pull_request:
    paths:
      - "tools/agentmux/**"
      - ".github/workflows/agentmux-*.yml"

permissions:
  contents: read

concurrency:
  group: agentmux-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    defaults:
      run:
        shell: bash
        working-directory: tools/agentmux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tools/agentmux/go.mod
          cache: true
          cache-dependency-path: tools/agentmux/go.sum

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Race test
        if: runner.os == 'Linux'
        run: go test -race ./...
