version: 1

defaults:
  tmux:
    # Recommended: use a user-isolated path (e.g. $XDG_RUNTIME_DIR/agentmux.sock).
    # /tmp/agentmux.sock is the fallback default when no value is set.
    socket: /tmp/agentmux.sock
    load_user_config: false
  status:
    busy_ttl_ms: 30000
  shell: /bin/bash -lc
  cwd: .
  env:
    TERM: xterm-256color
  capture:
    history: 120
    stable_ms: 1500
    poll_ms: 250
  max_instances: 8

templates:
  claude-code:
    description: Claude Code 通用编程智能体
    command: claude --dangerously-skip-permissions --model $MODEL
    model: anthropic/claude-sonnet-4.5
    harness_type: claude-code
    system_prompt: ""
    prompt: ""
    cwd: .

  codex-cli:
    description: Codex CLI 通用编程智能体
    command: codex --model $MODEL
    model: openai/gpt-5.4
    harness_type: codex-cli
    system_prompt: ""
    prompt: ""
    cwd: .

  gemini-cli:
    description: Gemini CLI 通用编程智能体
    command: gemini
    model: ""
    harness_type: gemini-cli
    system_prompt: ""
    prompt: ""
    cwd: .

  文档专家:
    description: 面向需求梳理、设计说明、使用文档和交付说明的专家
    command: codex --model $MODEL
    model: openai/gpt-5.4
    harness_type: codex-cli
    system_prompt: 你负责生成结构稳定、边界清楚、可执行的技术文档。
    prompt: ""
    cwd: .
