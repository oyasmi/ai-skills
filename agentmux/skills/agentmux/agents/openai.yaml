interface:
  display_name: "AgentMux"
  short_description: "Run isolated terminal and headless AI agent instances"
  default_prompt: "Use $agentmux to summon or reuse an agent instance, read its output, and send the next prompt without calling tmux directly. Check harness_type first: TUI harnesses (claude-code, codex-cli, gemini-cli) run inside tmux and return screen text, while structured harnesses (claude-code-ndjson, codex-cli-execjson) return protocol messages and never need an Enter key. On codex-cli-execjson an idle instance legitimately has no process, and prompting a busy one fails with execjson_instance_busy, so always wait before the next prompt."
